<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام إدارة العهد - الأصناف والجهات</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- شاشة التحميل -->
    <div id="loading-screen" class="loading-screen">
        <div class="loader">
            <i class="fas fa-boxes"></i>
            <p>جاري التحميل...</p>
        </div>
    </div>

    <!-- القائمة السفلية -->
    <nav class="bottom-nav" id="bottom-nav">
        <a href="#" class="nav-item active" data-page="dashboard">
            <i class="fas fa-chart-pie"></i>
            <span>الرئيسية</span>
        </a>
        <a href="#" class="nav-item" data-page="products">
            <i class="fas fa-boxes"></i>
            <span>الأصناف</span>
        </a>
        <a href="#" class="nav-item" data-page="movements">
            <i class="fas fa-exchange-alt"></i>
            <span>الحركات</span>
        </a>
        <a href="#" class="nav-item" data-page="entities">
            <i class="fas fa-hand-holding"></i>
            <span>الجهات</span>
        </a>
        <a href="#" class="nav-item" data-page="settings">
            <i class="fas fa-cog"></i>
            <span>الإعدادات</span>
        </a>
    </nav>

    <!-- المحتوى الرئيسي -->
    <main class="main-content" id="main-content"></main>

    <!-- نموذج إضافة حركة -->
    <div class="modal" id="movement-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">تسجيل حركة جديدة</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="movement-form">
                <div class="form-group">
                    <label>نوع الحركة *</label>
                    <select id="movement-type" required onchange="updateFormFields()">
                        <option value="">اختر نوع الحركة</option>
                        <option value="in">📥 استلام (وارد للرئيسي)</option>
                        <option value="out">📤 صرف (منصرف من الرئيسي)</option>
                        <option value="transfer">🔄 توزيع عهدة (للجهة)</option>
                        <option value="return">↩️ إرجاع عهدة (من الجهة)</option>
                        <option value="consume">🔨 استهلاك عهدة (مزاد)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>الصنف *</label>
                    <select id="movement-product" required>
                        <option value="">اختر الصنف</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>الكمية *</label>
                    <input type="number" id="movement-quantity" min="1" required placeholder="أدخل الكمية">
                </div>

                <div class="form-group">
                    <label>التاريخ *</label>
                    <input type="date" id="movement-date" required>
                </div>

                <div class="form-group">
                    <label>الرقم المرجعي *</label>
                    <input type="text" id="movement-reference" required placeholder="مثال: TRF-2024-001">
                </div>

                <div class="form-group">
                    <label>ملاحظات</label>
                    <textarea id="movement-notes" rows="2" placeholder="ملاحظات إضافية..."></textarea>
                </div>

                <!-- قسم الجهات -->
                <div id="warehouse-section" style="display:none;">
                    <div class="form-group" id="to-warehouse-group">
                        <label id="warehouse-label">الجهة</label>
                        <select id="movement-to-warehouse">
                            <option value="">اختر الجهة</option>
                        </select>
                    </div>
                    <div class="form-group" id="from-warehouse-group" style="display:none;">
                        <label>الجهة</label>
                        <select id="movement-from-warehouse">
                            <option value="">اختر الجهة</option>
                        </select>
                    </div>
                </div>

                <!-- قسم المزاد -->
                <div id="auction-section" style="display:none;">
                    <div class="form-group">
                        <label>سعر المزاد (ر.س)</label>
                        <input type="number" id="movement-auction-price" min="0" step="0.01" placeholder="أدخل سعر بيع المزاد">
                    </div>
                </div>

                <!-- رفع صور الفواتير -->
                <div class="form-group">
                    <label>صورة الفاتورة 1 (مرتبطة بالتاريخ) 📎</label>
                    <div class="file-upload" id="upload-1">
                        <input type="file" id="invoice-1" accept="image/*" capture="environment" hidden>
                        <div class="upload-placeholder" onclick="document.getElementById('invoice-1').click()">
                            <i class="fas fa-camera"></i>
                            <span>التقط صورة أو اختر من المعرض</span>
                        </div>
                        <img id="preview-1" class="image-preview" hidden>
                        <button type="button" class="remove-image" id="remove-1" hidden onclick="removeImage(1)">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label>صورة الفاتورة 2 (مرتبطة بالرقم المرجعي) 📎</label>
                    <div class="file-upload" id="upload-2">
                        <input type="file" id="invoice-2" accept="image/*" capture="environment" hidden>
                        <div class="upload-placeholder" onclick="document.getElementById('invoice-2').click()">
                            <i class="fas fa-camera"></i>
                            <span>التقط صورة أو اختر من المعرض</span>
                        </div>
                        <img id="preview-2" class="image-preview" hidden>
                        <button type="button" class="remove-image" id="remove-2" hidden onclick="removeImage(2)">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">إلغاء</button>
                    <button type="submit" class="btn-primary">حفظ الحركة</button>
                </div>
            </form>
        </div>
    </div>

    <!-- عارض الصور -->
    <div class="image-viewer" id="image-viewer" onclick="closeImageViewer()">
        <img id="viewer-img" src="" alt="صورة الفاتورة">
        <div class="viewer-info">
            <p id="viewer-caption"></p>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toast-container"></div>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/export.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
